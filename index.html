<!DOCTYPE html>
<html>
<head>
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="container">
  <h1 id="count">3</h1>
</div>

<script>
let count = 3;
let el = document.getElementById("count");

let timer = setInterval(function () {
  el.innerText = count;
  count--;

  if (count < 0) {
    clearInterval(timer);
    window.location.href = "welcome.html";
  }
}, 1000);
</script>

</body>
</html>
